<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SurfDiary Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="editor.css"/>
</head>
<body>
  <div class="editor-layout">
    <aside class="sidebar-list">
      <section class="sidebar-section">
        <div class="section-header">
          <h2>Saved Fragments</h2>
          <span id="block-count" class="section-count">0</span>
        </div>
        <div id="memo-list" class="memo-list">
          <!-- Saved fragments appear here -->
        </div>
      </section>

      <section class="sidebar-section documents-section">
        <div class="section-header">
          <h2>Documents</h2>
          <span id="document-count" class="section-count">0</span>
        </div>
        <div id="document-list" class="document-list">
          <!-- Saved documents appear here -->
        </div>
      </section>
    </aside>

    <main class="main-editor">
      <header class="main-header">
        <div class="editor-title-group">
          <h1>Document Builder</h1>
          <div class="title-row">
            <input id="document-title-input" class="title-input" type="text" placeholder="Document title" />
            <button id="today-title-btn" class="secondary-btn today-btn" type="button">today</button>
          </div>
        </div>
        <div class="editor-header-actions">
          <button id="toggle-preview-btn" class="secondary-btn preview-toggle-btn" type="button">Collapse preview</button>
          <button id="new-document-btn" class="secondary-btn" type="button">New</button>
          <button id="clear-document-btn" class="secondary-btn" type="button">Clear</button>
          <button id="save-document-btn" class="secondary-btn" type="button">Save diary</button>
          <button id="export-document-btn" class="primary-btn" type="button">Export .md</button>
        </div>
      </header>

      <div class="editor-body">
        <section class="draft-panel">
          <div class="draft-meta">
            <div id="document-status" class="document-status">Draft ready</div>
            <div id="attached-count" class="attached-count">0 fragments placed</div>
          </div>
          <textarea id="document-body" class="document-body" placeholder="Type your diary here, or drop saved fragments into this area."></textarea>
        </section>

        <div id="editor-splitter" class="editor-splitter" role="separator" aria-orientation="vertical" tabindex="0" aria-label="Resize document and preview panels"></div>

        <section class="preview-panel">
          <div class="preview-header">
            <h2>Markdown Preview</h2>
          </div>
          <div id="markdown-preview" class="markdown-preview">Markdown preview will appear here.</div>
        </section>
      </div>
    </main>
  </div>
  <script src="../shared/webext-compat.js"></script>
  <script src="../shared/surfdiary-store.js"></script>
  <script src="editor.js"></script>
</body>
</html>
